<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerät hinzufügen – Radiologie Institut</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; }
        .container { margin-top: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border: 1px solid #ddd; margin-top: 20px; }
        .form-group label { font-weight: 600; }
        .btn-primary { background-color: #2c6fad; border-color: #2c6fad; }
        .btn-primary:hover { background-color: #245c91; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #2c6fad; }
    </style>
</head>
<body>
<div class="container">

    <a th:href="@{/}" class="back-link">← Zurück zur Startseite</a>

    <div class="header">
        <h2>Radiologie Institut</h2>
        <h4>Neues Gerät hinzufügen</h4>
    </div>

    <div class="card">
        <form th:action="@{/device/save}" th:object="${device}" method="post">

            <div class="form-group">
                <label for="type">Art des Gerätes</label>
                <select class="form-control" id="type" th:field="*{type}" required>
                    <option value="">– bitte wählen –</option>
                    <option value="MR">MR (Magnetresonanz)</option>
                    <option value="CT">CT (Computertomographie)</option>
                    <option value="Röntgen">Röntgen</option>
                    <option value="Ultraschall">Ultraschall</option>
                    <option value="PET">PET</option>
                    <option value="Angiographie">Angiographie</option>
                    <option value="Sonstige">Sonstige</option>
                </select>
            </div>

            <div class="form-group">
                <label for="roomnumber">Raumnummer</label>
                <input type="number" class="form-control" id="roomnumber"
                       th:field="*{roomnumber}" placeholder="z.B. 101" required />
            </div>

            <hr />
            <button type="submit" class="btn btn-primary">Gerät speichern</button>
            <a th:href="@{/device/list}" class="btn btn-default" style="margin-left:10px;">Abbrechen</a>

        </form>
    </div>
</div>
</body>
</html>
