<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Geräteliste – Radiologie Institut</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; }
        .container { margin-top: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border: 1px solid #ddd; margin-top: 20px; }
        .table thead { background-color: #2c6fad; color: white; }
        .btn-primary { background-color: #2c6fad; border-color: #2c6fad; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #2c6fad; }
        .type-badge {
            display: inline-block; padding: 2px 8px; border-radius: 3px;
            font-size: 12px; font-weight: 600; color: white; background-color: #2c6fad;
        }
    </style>
</head>
<body>
<div class="container">

    <a th:href="@{/}" class="back-link">← Zurück zur Startseite</a>

    <div class="header">
        <h2>Radiologie Institut</h2>
        <h4>Geräteliste</h4>
    </div>

    <div class="card">
        <div style="margin-bottom:15px;">
            <a th:href="@{/device/add}" class="btn btn-primary btn-sm">+ Neues Gerät hinzufügen</a>
        </div>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Art des Gerätes</th>
                <th>Raumnummer</th>
                <th>Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="device : ${devices}">
                <td th:text="${device.id}"></td>
                <td><span class="type-badge" th:text="${device.type}"></span></td>
                <td th:text="${device.roomnumber}"></td>
                <td>
                    <a th:href="@{/reservation/list(deviceId=${device.id})}"
                       class="btn btn-xs btn-default">Reservierungen</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(devices)}">
                <td colspan="4" style="text-align:center; color:#888;">Keine Geräte vorhanden.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
