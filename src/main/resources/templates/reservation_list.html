<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservierungsliste – Radiologie Institut</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; }
        .container { margin-top: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border: 1px solid #ddd; margin-top: 20px; }
        .table thead { background-color: #2c6fad; color: white; }
        .btn-primary { background-color: #2c6fad; border-color: #2c6fad; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #2c6fad; }
        .filter-bar { background: #eaf1fb; padding: 15px; border: 1px solid #cde; margin-bottom: 20px; border-radius: 3px; }
    </style>
</head>
<body>
<div class="container">

    <a th:href="@{/}" class="back-link">← Zurück zur Startseite</a>

    <div class="header">
        <h2>Radiologie Institut</h2>
        <h4>Reservierungsliste</h4>
    </div>

    <!-- Fehlermeldung -->
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <strong>Fehler:</strong> <span th:text="${errorMessage}"></span>
    </div>

    <!-- Filter nach Gerät -->
    <div class="filter-bar">
        <form th:action="@{/reservation/list}" method="get" class="form-inline">
            <label style="margin-right:10px; font-weight:600;">Gerät:</label>
            <select class="form-control" name="deviceId" style="margin-right:10px; min-width:200px;">
                <option value="">– Alle Geräte –</option>
                <option th:each="d : ${devices}"
                        th:value="${d.id}"
                        th:text="${d.type + ' (Raum ' + d.roomnumber + ')'}"
                        th:selected="${d.id == selectedDevice}">
                </option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Filtern</button>
        </form>
    </div>

    <div class="card">
        <div style="margin-bottom:15px;">
            <a th:href="@{/reservation/add}" class="btn btn-primary btn-sm">+ Neue Reservierung erfassen</a>
        </div>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>Patient</th>
                <th>Gerät</th>
                <th>Startzeit</th>
                <th>Endzeit</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="res, stat : ${reservations}">
                <td th:text="${stat.count}"></td>
                <td th:text="${res.patient.surname + ', ' + res.patient.name}"></td>
                <td th:text="${res.device.type + ' – Raum ' + res.device.roomnumber}"></td>
                <td th:text="${#temporals.format(res.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(res.endTime, 'dd.MM.yyyy HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(reservations)}">
                <td colspan="5" style="text-align:center; color:#888;">Keine Reservierungen vorhanden.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
