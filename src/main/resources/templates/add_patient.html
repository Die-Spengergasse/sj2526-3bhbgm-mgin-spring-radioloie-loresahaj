<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Neuer Patient</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 30px; }
        .wrapper { max-width: 400px; margin: auto; background: white; padding: 24px; border: 1px solid #ddd; }
        h1 { font-size: 20px; font-weight: normal; margin: 0 0 20px; }
        label { display: block; margin-top: 14px; font-size: 13px; color: #555; }
        input, select { width: 100%; padding: 8px; margin-top: 4px;
            border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        input[type="submit"] { margin-top: 20px; background: black; color: white;
            border: none; cursor: pointer; padding: 10px; }
        input[type="submit"]:hover { background: #333; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>Neuer Patient</h1>
    <form th:action="@{/patient/add}" th:object="${patient}" method="post">
        <label>Sozialversicherungsnummer</label>
        <input type="text" th:field="*{socialsecuritynumber}" maxlength="10">

        <label>Vorname</label>
        <input type="text" th:field="*{name}">

        <label>Nachname</label>
        <input type="text" th:field="*{surname}">

        <label>Geschlecht</label>
        <select th:field="*{gender}">
            <option value="">-- Bitte wählen --</option>
            <option value="F">Weiblich</option>
            <option value="M">Männlich</option>
            <option value="D">Divers</option>
        </select>

        <label>Geburtsdatum</label>
        <input type="date" th:field="*{birth}">

        <input type="submit" value="Speichern">
    </form>
</div>
</body>
</html>
