<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patientenliste – Radiologie Institut</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; }
        .container { margin-top: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border: 1px solid #ddd; margin-top: 20px; }
        .table thead { background-color: #2c6fad; color: white; }
        .btn-primary { background-color: #2c6fad; border-color: #2c6fad; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #2c6fad; }
    </style>
</head>
<body>
<div class="container">

    <a th:href="@{/}" class="back-link">← Zurück zur Startseite</a>

    <div class="header">
        <h2>Radiologie Institut</h2>
        <h4>Patientenliste</h4>
    </div>

    <div class="card">
        <div style="margin-bottom:15px;">
            <a th:href="@{/patient/add}" class="btn btn-primary btn-sm">+ Neuen Patienten registrieren</a>
        </div>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>SVNR</th>
                <th>Nachname</th>
                <th>Vorname</th>
                <th>Geschlecht</th>
                <th>Geburtsdatum</th>
                <th>Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.ssn}"></td>
                <td th:text="${patient.surname}"></td>
                <td th:text="${patient.name}"></td>
                <td th:text="${patient.gender}"></td>
                <td th:text="${#temporals.format(patient.birth, 'dd.MM.yyyy')}"></td>
                <td>
                    <a th:href="@{/reservation/add}" class="btn btn-xs btn-default">Reservierung</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(patients)}">
                <td colspan="6" style="text-align:center; color:#888;">Keine Patienten vorhanden.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
