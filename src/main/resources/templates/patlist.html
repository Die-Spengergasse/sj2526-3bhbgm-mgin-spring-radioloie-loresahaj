<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patientenliste</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 30px; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 24px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { font-size: 22px; margin-bottom: 20px; text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
            color: #888; border-bottom: 1px solid #333; padding: 8px 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .delete-btn { color: #c0392b; text-decoration: none; font-size: 13px; margin-right: 8px; }
        .delete-btn:hover { text-decoration: underline; }
        .reserve-btn { color: #27ae60; text-decoration: none; font-size: 13px; }
        .reserve-btn:hover { text-decoration: underline; }
        .add-btn { display: inline-block; margin-top: 16px; font-size: 13px; color: #555; text-decoration: none; }
        .add-btn:hover { color: #000; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>Patientenliste</h1>
    <table>
        <thead>
        <tr>
            <th>SVNR</th>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Geschlecht</th>
            <th>Geburtsdatum</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${patients}">
            <td th:text="${p.socialsecuritynumber}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.surname}"></td>
            <td th:text="${p.gender}"></td>
            <td th:text="${p.birth}"></td>
            <td>
                <a th:href="@{'/patient/delete/' + ${p.id}}"
                   class="delete-btn"
                   onclick="return confirm('Wirklich löschen?')">Löschen</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/patient/add" class="add-btn">+ Neuer Patient</a>
</div>
</body>
</html>
